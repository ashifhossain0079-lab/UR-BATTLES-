<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>UR BATTLE · Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { font-family: 'Orbitron', sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a1a 100%);
            color: #e0e0e0;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        .glass-card {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.3);
        }
        .btn-primary {
            background: linear-gradient(90deg, #f97316, #ea580c);
            box-shadow: 0 4px 15px rgba(249,115,22,0.4);
        }
        .btn-primary:active { transform: scale(0.97); }
        .bottom-nav a.active {
            color: #f97316 !important;
            text-shadow: 0 0 4px #f97316;
        }
        .bottom-nav a.active i { color: #f97316 !important; }
        .live-badge { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .loader {
            border: 3px solid rgba(249,115,22,0.3);
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .countdown {
            font-family: monospace;
            background: #00000066;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans">

<div class="max-w-md mx-auto min-h-screen relative pb-20">
    <!-- Header -->
    <div class="sticky top-0 z-30 bg-gradient-to-r from-gray-900/95 to-gray-800/95 backdrop-blur-md border-b border-orange-500/30 px-4 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fas fa-skull text-orange-500 text-2xl"></i>
            <h1 class="text-xl font-extrabold tracking-wider bg-gradient-to-r from-orange-400 to-orange-600 bg-clip-text text-transparent">UR BATTLE</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="darkModeToggle" class="text-orange-400 text-xl"><i class="fas fa-bolt"></i></button>
            <div class="bg-gradient-to-r from-orange-600 to-red-600 px-3 py-1.5 rounded-full text-white text-xs font-bold flex items-center gap-1 shadow-lg">
                <i class="fas fa-coins text-yellow-300"></i> <span id="headerWallet">0</span>
            </div>
        </div>
    </div>

    <div id="appContent" class="px-4 py-4 space-y-5">
        <div class="flex justify-center py-20"><div class="loader"></div></div>
    </div>

    <!-- Bottom Navigation -->
    <div id="bottomNav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gray-900/90 backdrop-blur-md border-t border-orange-500/30 flex justify-around py-2 shadow-2xl z-30">
        <a href="#" data-nav="home" class="flex flex-col items-center text-gray-400"><i class="fas fa-home text-xl"></i><span class="text-[11px]">Home</span></a>
        <a href="#" data-nav="tournaments" class="flex flex-col items-center text-gray-400"><i class="fas fa-trophy text-xl"></i><span class="text-[11px]">Tourneys</span></a>
        <a href="#" data-nav="myMatches" class="flex flex-col items-center text-gray-400"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[11px]">My Matches</span></a>
        <a href="#" data-nav="wallet" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet text-xl"></i><span class="text-[11px]">Wallet</span></a>
        <a href="#" data-nav="profile" class="flex flex-col items-center text-gray-400"><i class="fas fa-user-circle text-xl"></i><span class="text-[11px]">Profile</span></a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCFrTLdB3OVrnKgC7y0awui_8V9XW04pEY",
        authDomain: "ur-battle.firebaseapp.com",
        databaseURL: "https://ur-battle-default-rtdb.firebaseio.com",
        projectId: "ur-battle",
        storageBucket: "ur-battle.firebasestorage.app",
        messagingSenderId: "246704992806",
        appId: "1:246704992806:web:671a5a5b8912d69cdf2ce7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const CURRENT_APP_VERSION = "2.0.0";
    let currentUser = null;
    let currentUserData = null;
    let currentSection = 'home';
    let tournamentsCache = null;
    let joinedTournamentListeners = {}; // store listeners to detach later

    function toast(msg) { alert(msg); }
    function formatDate(ts) { return ts ? new Date(ts).toLocaleString() : 'TBD'; }
    function updateHeaderWallet(balance) { document.getElementById('headerWallet').innerText = Math.floor(balance || 0); }

    // ---------- Request notification permission ----------
    async function requestNotificationPermission() {
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    // ---------- Show browser notification ----------
    function showNotification(title, body, tag = 'match') {
        if (Notification.permission === 'granted') {
            new Notification(title, { body, icon: 'https://placehold.co/64?text=UR', tag });
        }
    }

    // ---------- Real‑time listener for joined tournaments (only active on My Matches) ----------
    function attachListenersToJoinedTournaments(tournamentsList) {
        // Detach previous listeners
        for (let tid in joinedTournamentListeners) {
            joinedTournamentListeners[tid]();
            delete joinedTournamentListeners[tid];
        }
        // Attach new listeners
        for (let t of tournamentsList) {
            const tid = t.tid;
            const ref = db.ref(`/tournaments/${tid}`);
            const callback = ref.on('value', (snap) => {
                const updated = snap.val();
                if (!updated) return;
                // Check if status changed to Live and room details are available
                const oldStatus = t.status;
                t.status = updated.status;
                t.roomId = updated.roomId;
                t.roomPassword = updated.roomPassword;
                // If status became Live and we haven't notified yet for this match
                if (updated.status === 'Live' && (oldStatus !== 'Live')) {
                    if (updated.roomId) {
                        showNotification('🔴 Match is LIVE!', `${updated.matchTitle}\nRoom ID: ${updated.roomId}\nPassword: ${updated.roomPassword || 'N/A'}`, `live_${tid}`);
                    } else {
                        showNotification('🔴 Match is LIVE!', `${updated.matchTitle} – Room details coming soon!`, `live_${tid}`);
                    }
                    // Refresh My Matches view if currently visible
                    if (currentSection === 'myMatches') renderMyMatches();
                } else if (updated.status !== oldStatus) {
                    // any status change, refresh
                    if (currentSection === 'myMatches') renderMyMatches();
                }
            });
            joinedTournamentListeners[tid] = () => ref.off('value', callback);
        }
    }

    // ---------- Helper: update wallet ----------
    async function addTransaction(uid, type, amount, desc) {
        await db.ref(`/users/${uid}/transactions`).push({ type, amount, description: desc, timestamp: Date.now() });
    }
    async function updateWallet(uid, delta, reason) {
        const userRef = db.ref(`/users/${uid}/wallet`);
        const snap = await userRef.once('value');
        let cur = snap.val() || 0;
        let newBal = cur + delta;
        if (newBal < 0) throw new Error("Insufficient balance");
        await userRef.set(newBal);
        await addTransaction(uid, delta > 0 ? 'credit' : 'debit', Math.abs(delta), reason);
        if (uid === currentUser?.uid) updateHeaderWallet(newBal);
        return newBal;
    }

    // ---------- VERSION CHECK ----------
    async function checkForAppUpdate() {
        try {
            const notifiedKey = `appUpdateNotified_${CURRENT_APP_VERSION}`;
            if (sessionStorage.getItem(notifiedKey) === 'true') return;
            const versionSnap = await db.ref('/appVersion').once('value');
            const remote = versionSnap.val();
            if (!remote) return;
            if (remote.version !== CURRENT_APP_VERSION) {
                const msg = remote.message || `🔥 New version ${remote.version} available! 🔥\nPlease refresh for best experience.`;
                if (remote.forceUpdate) {
                    alert(msg + " (Force update – page will reload)");
                    sessionStorage.setItem(notifiedKey, 'true');
                    window.location.reload();
                } else {
                    const userConfirmed = confirm(msg + "\n\nOK → Refresh now\nCancel → Continue without update");
                    if (userConfirmed) {
                        sessionStorage.setItem(notifiedKey, 'true');
                        window.location.reload();
                    } else {
                        sessionStorage.setItem(notifiedKey, 'true');
                    }
                }
            }
        } catch(e) { console.warn(e); }
    }

    // ---------- AUTH UI ----------
    function renderAuth() {
        document.getElementById('appContent').innerHTML = `
            <div class="glass-card p-6 mt-8">
                <div class="flex gap-3 border-b border-orange-500/30 mb-5">
                    <button id="loginTabBtn" class="py-2 px-4 font-bold text-orange-400 border-b-2 border-orange-500">LOGIN</button>
                    <button id="signupTabBtn" class="py-2 px-4 font-bold text-gray-400">SIGN UP</button>
                </div>
                <div id="loginPanel">
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-3 text-white">
                    <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-4 text-white">
                    <button id="doLogin" class="w-full btn-primary text-white font-bold py-3 rounded-xl">ENTER ARENA</button>
                    <hr class="my-3 border-gray-700">
                    <button id="googleLoginBtn" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl flex items-center justify-center gap-2"><i class="fab fa-google"></i> Google Sign In</button>
                    <div class="text-center mt-3"><button id="forgotPwdBtn" class="text-sm text-orange-400">Forgot Password?</button></div>
                </div>
                <div id="signupPanel" class="hidden">
                    <input type="text" id="signupName" placeholder="Username" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-3 text-white">
                    <input type="email" id="signupEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-3 text-white">
                    <input type="tel" id="signupPhone" placeholder="Phone" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-3 text-white">
                    <input type="password" id="signupPassword" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-4 text-white">
                    <input type="text" id="referralCodeInput" placeholder="Referral Code (optional)" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 mb-4 text-white">
                    <button id="doSignup" class="w-full bg-gradient-to-r from-green-600 to-teal-600 text-white font-bold py-3 rounded-xl">CREATE ACCOUNT</button>
                </div>
            </div>
        `;
        document.getElementById('loginTabBtn').onclick = () => { document.getElementById('loginPanel').classList.remove('hidden'); document.getElementById('signupPanel').classList.add('hidden'); };
        document.getElementById('signupTabBtn').onclick = () => { document.getElementById('signupPanel').classList.remove('hidden'); document.getElementById('loginPanel').classList.add('hidden'); };
        document.getElementById('doLogin').onclick = async () => { try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } catch(e) { toast(e.message); } };
        document.getElementById('forgotPwdBtn').onclick = async () => { const email = prompt("Email:"); if(email) try { await auth.sendPasswordResetEmail(email); toast("Reset link sent"); } catch(e) { toast(e.message); } };
        document.getElementById('doSignup').onclick = async () => {
            const name = document.getElementById('signupName').value.trim(), email = document.getElementById('signupEmail').value.trim(), phone = document.getElementById('signupPhone').value.trim(), pwd = document.getElementById('signupPassword').value, ref = document.getElementById('referralCodeInput').value.trim();
            if (!name || !email || !phone || !pwd) return toast("All fields required");
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                const uid = cred.user.uid;
                const ownRef = uid.slice(0,8);
                await db.ref(`/users/${uid}`).set({ username: name, email, phone, wallet: 0, transactions: [], referralCode: ownRef, referredBy: ref || null, referralEarnings: 0 });
                if (ref) {
                    const refSnap = await db.ref('/users').orderByChild('referralCode').equalTo(ref).once('value');
                    if (refSnap.exists()) { const refUid = Object.keys(refSnap.val())[0]; await updateWallet(refUid, 50, `Referral bonus`); await updateWallet(uid, 20, "Referral bonus"); }
                    else await updateWallet(uid, 10, "Welcome bonus");
                } else await updateWallet(uid, 10, "Welcome bonus");
                toast("Account created! Please login.");
            } catch(e) { toast(e.message); }
        };
        document.getElementById('googleLoginBtn').onclick = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const snap = await db.ref(`/users/${user.uid}`).once('value');
                if (!snap.exists()) {
                    const ownRef = user.uid.slice(0,8);
                    await db.ref(`/users/${user.uid}`).set({ username: user.displayName || user.email.split('@')[0], email: user.email, phone: "", wallet: 10, transactions: [{ type: 'credit', amount: 10, description: 'Welcome bonus', timestamp: Date.now() }], referralCode: ownRef, referredBy: null, referralEarnings: 0 });
                    updateHeaderWallet(10);
                }
                toast("Google sign-in success");
            } catch(e) { toast(e.message); }
        };
    }

    // ---------- CACHE ----------
    async function loadTournamentsCache() {
        if (!tournamentsCache) {
            const snap = await db.ref('/tournaments').once('value');
            tournamentsCache = snap.val() || {};
        }
        return tournamentsCache;
    }

    // ---------- Tournament Details Modal ----------
    async function showTournamentDetails(tid, tournament) {
        const participants = tournament.participants ? Object.entries(tournament.participants) : [];
        const participantCount = participants.length;
        const maxSlots = tournament.totalSlots || '∞';
        const isJoined = tournament.participants && tournament.participants[currentUser.uid];
        let participantsHtml = '<div class="mt-4"><p class="text-sm font-semibold text-orange-400">PARTICIPANTS (' + participantCount + '/' + maxSlots + '):</p><div class="max-h-40 overflow-y-auto text-xs space-y-1 mt-1">';
        if (participantCount === 0) {
            participantsHtml += '<div class="text-gray-500">No one has joined yet. Be the first!</div>';
        } else {
            for (let [uid, p] of participants) {
                participantsHtml += `<div class="flex justify-between border-b border-gray-700 py-1"><span>${p.username || uid.slice(0,6)}</span><span class="text-gray-400">ID: ${p.gameId || 'N/A'}</span></div>`;
            }
        }
        participantsHtml += '</div></div>';
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 modal flex items-center justify-center z-50 p-4';
        modal.innerHTML = `
            <div class="bg-gray-900 rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto p-5 border border-orange-500/30 shadow-2xl">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xl font-bold text-orange-400">${tournament.matchTitle}</h2>
                    <button id="closeModalBtn" class="text-gray-400 hover:text-white text-xl">&times;</button>
                </div>
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between"><span>🎮 Game:</span><span class="font-semibold">${tournament.gameName}</span></div>
                    <div class="flex justify-between"><span>⚔️ Mode:</span><span class="font-semibold">${tournament.matchType || 'Solo'}</span></div>
                    <div class="flex justify-between"><span>💰 Entry Fee:</span><span class="text-orange-400 font-bold">₹${tournament.entryFee}</span></div>
                    <div class="flex justify-between"><span>🏆 Winning Prize:</span><span class="text-green-400">₹${tournament.winningPrize}</span></div>
                    <div class="flex justify-between"><span>🔫 Per Kill Reward:</span><span>₹${tournament.perKillReward || 0}</span></div>
                    ${tournament.secondPrize ? `<div class="flex justify-between"><span>🥈 2nd Prize:</span><span>₹${tournament.secondPrize}</span></div>` : ''}
                    ${tournament.thirdPrize ? `<div class="flex justify-between"><span>🥉 3rd Prize:</span><span>₹${tournament.thirdPrize}</span></div>` : ''}
                    <div class="flex justify-between"><span>🗺️ Map:</span><span>${tournament.map || 'Any'}</span></div>
                    <div class="flex justify-between"><span>🎮 Mode (TPP/FPP):</span><span>${tournament.mode || 'TPP'}</span></div>
                    <div class="flex justify-between"><span>👥 Slots:</span><span>${participantCount}/${maxSlots}</span></div>
                    <div class="flex justify-between"><span>📅 Match Time:</span><span>${formatDate(tournament.matchDateTime)}</span></div>
                    <div class="flex justify
